services:
  - type: web
    name: queuego
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PUBLIC_URL
        value: https://queuego.onrender.com
      - key: SMS_PROVIDER
        value: console
      - key: JWT_SECRET
        sync: false
      - key: PASSWORD_PEPPER
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_NAME
        value: Campus Operations
      - key: ADMIN_OPEN_REGISTRATION
        value: "true"
      - key: MAX_BATCH_SIZE
        value: "4"
      - key: WAIT_THRESHOLD_MINUTES
        value: "5"
